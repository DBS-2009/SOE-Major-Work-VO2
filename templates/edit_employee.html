{% extends "base.html" %}
{% block content %}

<style>
/* ------------------------------
   GLOBAL PAGE STYLING
------------------------------ */
.edit-employee-wrapper {
  max-width: 650px;
  margin: 2.5rem auto;
  background: #0d0d0d;
  border: 1px solid #1f1f1f;
  padding: 2rem;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
}

.page-title {
  font-size: 1.8rem;
  font-weight: 600;
  color: #ffffff;
  margin-bottom: 1.5rem;
  text-align: center;
}

/* ------------------------------
   FORM ELEMENTS
------------------------------ */
.form-group {
  margin-bottom: 1.25rem;
}

.form-label {
  display: block;
  color: #b0bcc4;
  font-size: 0.85rem;
  margin-bottom: 0.45rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.form-input {
  width: 100%;
  padding: 0.75rem 0.9rem;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  color: #f5f5f5;
  font-size: 0.95rem;
  transition: 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: #ff3b3b;
  box-shadow: 0 0 0 2px rgba(255, 59, 59, 0.35);
}

/* ------------------------------
   GRID ROWS
------------------------------ */
.form-row {
  display: flex;
  gap: 1rem;
}

.form-row .form-group {
  flex: 1;
}

/* ------------------------------
   BUTTONS
------------------------------ */
.btn-row {
  display: flex;
  justify-content: flex-end;
  gap: 0.75rem;
  padding-top: 1.25rem;
  border-top: 1px solid #1f1f1f;
  margin-top: 1.5rem;
}

.btn-primary {
  background: #ff2e2e;
  border: 1px solid #ff2e2e;
  padding: 0.65rem 1.2rem;
  border-radius: 6px;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.btn-primary:hover {
  background: #ff4d4d;
  box-shadow: 0 0 12px rgba(255, 46, 46, 0.4);
}

.btn-secondary {
  background: transparent;
  border: 1px solid #444;
  padding: 0.65rem 1.2rem;
  border-radius: 6px;
  color: #ccc;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.btn-secondary:hover {
  border-color: #ff9191;
  color: #ff9191;
}
</style>

<div class="edit-employee-wrapper">
  <h2 class="page-title">Edit Employee</h2>

  <form method="post" action="{{ url_for('edit_employee', employee_id=employee.id) }}">

    <div class="form-group">
      <label class="form-label">Name *</label>
      <input type="text" name="name" value="{{ employee.name }}" required class="form-input">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Age</label>
        <input type="number" name="age" value="{{ employee.age or '' }}" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label">Experience (years)</label>
        <input type="number" name="experience_years" value="{{ employee.experience_years or 0 }}" class="form-input">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Level of Training</label>
      <input type="text" name="level_of_training" value="{{ employee.level_of_training or '' }}" class="form-input">
    </div>

    <div class="form-group">
      <label class="form-label">Training Status</label>
      <input type="text" name="training_status" value="{{ employee.training_status or 'Not Trained' }}" class="form-input">
    </div>


    <div class="form-group">
      <label class="form-label">Add Qualification (optional)</label>
      <select name="qualifications" class="form-input">
        <option value="">Select a qualification</option>
        {% for q in qualifications_list %}
          <option value="{{ q.name }}">{{ q.name }}{% if q.description %} — {{ q.description }}{% endif %}</option>
        {% endfor %}
      </select>
    </div>

    <div class="btn-row">
      <a href="{{ url_for('employee_detail', employee_id=employee.id) }}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary">Save Changes</button>
    </div>

  </form>
</div>

{% endblock %}
