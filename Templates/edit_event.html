{% extends "base.html" %}
{% block content %}

<style>
/* ------------------------------
   GLOBAL PAGE STYLING
------------------------------ */
.edit-event-wrapper {
  max-width: 650px;
  margin: 2.5rem auto;
  background: #0d0d0d;
  border: 1px solid #1f1f1f;
  padding: 2rem;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);
}
 
.page-title {
  font-size: 1.8rem;
  font-weight: 600;
  color: #ffffff;
  margin-bottom: 1.5rem;
  text-align: center;
}

/* ------------------------------
   FORM ELEMENTS
------------------------------ */
.form-group {  
  margin-bottom: 1.25rem;
}

.form-label {
  display: block;
  color: #b0bcc4;
  font-size: 0.85rem;
  margin-bottom: 0.45rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.form-input,
.form-select,
.form-multiselect {
  width: 100%;
  padding: 0.75rem 0.9rem;
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  color: #f5f5f5;
  font-size: 0.95rem;
  transition: 0.2s;
}

.form-input:focus,
.form-select:focus,
.form-multiselect:focus {
  outline: none;
  border-color: #ff3b3b;
  box-shadow: 0 0 0 2px rgba(255, 59, 59, 0.35);
}

/* ------------------------------
   GRID ROWS
------------------------------ */
.form-row {
  display: flex;
  gap: 1rem;
}

.form-row .form-group {
  flex: 1;
}

/* ------------------------------
   RESOURCE CHECKLIST
------------------------------ */
.resource-box {
  background: #111;
  border: 1px solid #2a2a2a;
  border-radius: 6px;
  padding: 1rem;
  max-height: 240px;
  overflow-y: auto;
}

.resource-item {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 0.7rem;
  cursor: pointer;
}

.resource-item span {
  color: #e0e0e0;
  font-size: 0.9rem;
}

/* ------------------------------
   BUTTONS
------------------------------ */
.btn-row {
  display: flex;
  justify-content: flex-end;
  gap: 0.75rem;
  padding-top: 1.25rem;
  border-top: 1px solid #1f1f1f;
  margin-top: 1.5rem;
}

.btn-primary {
  background: #ff2e2e;
  border: 1px solid #ff2e2e;
  padding: 0.65rem 1.2rem;
  border-radius: 6px;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.btn-primary:hover {
  background: #ff4d4d;
  box-shadow: 0 0 12px rgba(255, 46, 46, 0.4);
}

.btn-secondary {
  background: transparent;
  border: 1px solid #444;
  padding: 0.65rem 1.2rem;
  border-radius: 6px;
  color: #ccc;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s;
}

.btn-secondary:hover {
  border-color: #ff9191;
  color: #ff9191;
}
</style>

<div class="edit-event-wrapper">
  <h2 class="page-title">Edit Event</h2>

  <form method="post">

    <div class="form-group">
      <label class="form-label">Event Title</label>
      <input type="text" name="title" value="{{ event.title }}" class="form-input">
    </div>

    <div class="form-group">
      <label class="form-label">Location</label>
      <input type="text" name="location" value="{{ event.location }}" class="form-input">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Start Time</label>
        <input type="datetime-local" name="start_time"
               value="{{ event.start_time.strftime('%Y-%m-%dT%H:%M') if event.start_time else '' }}"
               class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label">End Time</label>
        <input type="datetime-local" name="end_time"
               value="{{ event.end_time.strftime('%Y-%m-%dT%H:%M') if event.end_time else '' }}"
               class="form-input">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Setup Minutes</label>
        <input type="number" name="setup_minutes" value="{{ event.setup_minutes or '' }}" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label">Packup Minutes</label>
        <input type="number" name="packup_minutes" value="{{ event.packup_minutes or '' }}" class="form-input">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Assign Employees</label>
      <select name="employee_ids" multiple class="form-multiselect">
        {% for emp in employees %}
        <option value="{{ emp.id }}" {% if emp in event.employees %}selected{% endif %}>
          {{ emp.name }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Assign Resources</label>
      <div class="resource-box">
        {% for res in resources %}
        <label class="resource-item">
          <input type="checkbox" name="resource_ids" value="{{ res.id }}"
                 {% if res in event.resources %}checked{% endif %}>
          <span>{{ res.item_code }}{% if res.description %} — {{ res.description }}{% endif %}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="btn-row">
      <a href="{{ url_for('events') }}" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary">Save Changes</button>
    </div>

  </form>
</div>

{% endblock %}
